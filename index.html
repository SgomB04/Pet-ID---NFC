<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<title>Pet ID</title>

<style>

body{
font-family:Arial;
background:#f4f4f4;
text-align:center;
padding:40px;
}

.card{
background:white;
padding:30px;
border-radius:15px;
max-width:400px;
margin:auto;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

img{
width:200px;
border-radius:10px;
margin-bottom:20px;
}

button{
padding:12px 20px;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
margin:5px;
}

.llamar{
background:#27ae60;
color:white;
}

.whatsapp{
background:#25D366;
color:white;
}

.error{
color:red;
font-size:20px;
}

</style>

</head>

<body>

<div class="card" id="card">

<img id="foto">

<h2 id="nombre"></h2>

<p id="raza"></p>
<p id="edad"></p>

<a id="telefono">
<button class="llamar">📞 Llamar al dueño</button>
</a>

<br>

<a id="whatsapp" target="_blank">
<button class="whatsapp">💬 WhatsApp</button>
</a>

</div>

<script>

const mascotas = {

"KUV5UC83":{
nombre:"Aquiles",
raza:"Pastor alemán negro sólido",
edad:"5 años",
telefono:"MzMxNjAwMjE5Mg==",
foto:"Aquiles.jpeg"
},

"FG57FB5F":{
nombre:"Ares",
raza:"Pastor Belga Tervueren",
edad:"5 años",
telefono:"MzMxNjAwMjE5Mg==",
foto:"Ares.jpeg"
}

};

const params = new URLSearchParams(window.location.search);
const id = params.get("id");

if(!id || !mascotas[id]){

document.getElementById("card").innerHTML =
"<p class='error'>⚠️ Mascota no encontrada</p>";

}else{

const mascota = mascotas[id];

const telefono = atob(mascota.telefono);

document.getElementById("nombre").innerText = mascota.nombre;
document.getElementById("raza").innerText = "Raza: " + mascota.raza;
document.getElementById("edad").innerText = "Edad: " + mascota.edad;
document.getElementById("foto").src = mascota.foto;

document.getElementById("telefono").href = "tel:" + telefono;

document.getElementById("whatsapp").href =
"https://wa.me/52" + telefono +
"?text=Hola,%20encontré%20a%20tu%20perro%20" + mascota.nombre;

}

</script>

</body>
</html>
