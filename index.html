<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Pet ID</title>

<style>

body{
font-family:Arial;
text-align:center;
background:#f5f5f5;
padding:40px;
}

.card{
background:white;
padding:30px;
border-radius:15px;
max-width:400px;
margin:auto;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

img{
width:200px;
border-radius:10px;
margin-bottom:20px;
}

button{
padding:12px 20px;
border:none;
border-radius:8px;
background:#2ecc71;
color:white;
font-size:16px;
cursor:pointer;
}

.error{
color:red;
font-size:20px;
}

</style>

</head>

<body>

<div class="card" id="card">

<img id="foto">

<h2 id="nombre"></h2>

<p id="raza"></p>
<p id="edad"></p>

<a id="telefono">
<button>📞 Llamar al dueño</button>
</a>

</div>

<script>

const mascotas = {

"aqx92kd":{
nombre:"Aquiles",
raza:"Pastor alemán negro sólido",
edad:"5 años",
telefono:"MzMxNjAwMjE5Mg==",
foto:"Aquiles.jpeg"
},

"k28dls9":{
nombre:"Ares",
raza:"Pastor Belga Tervueren",
edad:"5 años",
telefono:"MzMxNjAwMjE5Mg==",
foto:"Ares.jpeg"
}

"KU9RGU6Q":{
nombre:"Blacky",
raza:"Criolla",
edad:"3 años",
telefono:"MzkzMTA0MjY0Ngk=",
foto: "blacky.jpeg"
}

};

const params = new URLSearchParams(window.location.search);
const id = params.get("id");

if(!id || !mascotas[id]){

document.getElementById("card").innerHTML =
"<p class='error'>⚠️ Mascota no encontrada</p>";

}else{

const mascota = mascotas[id];

document.getElementById("nombre").innerText = mascota.nombre;
document.getElementById("raza").innerText = "Raza: " + mascota.raza;
document.getElementById("edad").innerText = "Edad: " + mascota.edad;
document.getElementById("foto").src = mascota.foto;
document.getElementById("telefono").href = "tel:" + mascota.telefono;

}

</script>

</body>
</html>
